{% for game in games %}
<a href="{% url 'detail' game.id %}" class="group relative block aspect-[3/4] rounded-2xl overflow-hidden bg-zinc-900 border border-white/5 transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_50px_rgba(0,0,0,0.6)]">
    {% if game.cover %}
        <img src="{{ game.cover.url }}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
    {% else %}
        <div class="w-full h-full flex items-center justify-center bg-zinc-800 text-zinc-700 italic text-xs">Sin portada</div>
    {% endif %}
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
        <div class="w-full">
            <p class="text-white font-black text-[10px] leading-tight truncate uppercase mb-1">{{ game.name }}</p>
            {% if game.total_rating %}
                <div class="text-pink-500 font-black text-[10px]">
                    <i class="fas fa-star mr-1"></i>{{ game.total_rating|floatformat:0 }}%
                </div>
            {% endif %}
        </div>
    </div>
</a>
{% endfor %}
